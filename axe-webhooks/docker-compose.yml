version: "3.7"

services:
  app_proxy:
    environment:
      APP_HOST: web
      APP_PORT: 3456
    depends_on:
      - web

  web:
    image: ghcr.io/akacurtis/axe-webhooks-web:0.7.1
    init: true
    restart: on-failure
    stop_grace_period: 1m
    volumes:
      - ${APP_DATA_DIR}:/data
    environment:
      ADMIN_PASSWORD: "${APP_AXE_WEBHOOKS_ADMIN_PASSWORD:-}"

  watcher:
    image: ghcr.io/akacurtis/axe-webhooks-watcher:0.7.1
    init: true
    restart: on-failure
    stop_grace_period: 1m
    volumes:
      - ${APP_DATA_DIR}:/data
    environment:
      POLL_SECONDS: "${APP_AXE_WEBHOOKS_POLL_SECONDS:-15}"
    depends_on:
      - web
